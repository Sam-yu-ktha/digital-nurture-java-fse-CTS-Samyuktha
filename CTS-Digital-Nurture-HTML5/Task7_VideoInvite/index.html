<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Promo Video</title>
    <script>
        function videoReady() {
            document.getElementById("message").innerHTML =
            "Video ready to play";
        }
        window.onbeforeunload = function() {
            return "Are you sure you want to leave this page?";
        };
    </script>
</head>
<body>
    <h1>Community Event Promo</h1>
    <video width="500"
           controls
           oncanplay="videoReady()">
        <source src="eventvideo.mp4"
                type="video/mp4">
        Your browser does not support video.
    </video>
    <p id="message"></p>
</body>
</html>
