<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        Welcome to the Community Event Portal
    </div>
    <br>
    <p>
        Residents can register for various
        <span class="highlight">community events</span>
        through this portal.
    </p>
    <p>
        <span style="color:red; font-weight:bold;">
            Special Offer: Free registration for the first 50 participants!
        </span>
    </p>
    <p class="highlight">
        Upcoming Cultural Festival Registration Open
    </p>
</body>
</html>
