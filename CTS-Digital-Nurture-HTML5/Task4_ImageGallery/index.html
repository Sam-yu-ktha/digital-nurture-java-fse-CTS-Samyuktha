<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Event Gallery</title>
    <style>
        table {
            border-collapse: collapse;
            margin: auto;
        }
        td {
            padding: 15px;
            text-align: center;
        }
        .eventImage {
            width: 180px;
            height: 120px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <h1 align="center">Community Event Gallery</h1>
    <table border="1">
        <tr>
            <td>
                <img src="event1.jpg"
                     alt="Music Festival"
                     title="Music Festival"
                     class="eventImage">
                <p>Music Festival</p>
            </td>
            <td>
                <img src="event2.jpg"
                     alt="Sports Meet"
                     title="Sports Meet"
                     class="eventImage">
                <p>Sports Meet</p>
            </td>
            <td>
                <img src="event3.jpg"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="eventImage">
                <p>Art Exhibition</p>
            </td>
        </tr>
        <tr>
            <td>
                <img src="event4.jpg"
                     alt="Book Fair"
                     title="Book Fair"
                     class="eventImage">
                <p>Book Fair</p>
            </td>
            <td>
                <img src="event5.jpg"
                     alt="Food Festival"
                     title="Food Festival"
                     class="eventImage">
                <p>Food Festival</p>
            </td>
            <td>
                <img src="event6.jpg"
                     alt="Cultural Program"
                     title="Cultural Program"
                     class="eventImage">
                <p>Cultural Program</p>
            </td>
        </tr>
    </table>
</body>
</html>
